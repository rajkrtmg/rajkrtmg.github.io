<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:ital@1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css"
        integrity="sha384-9aIt2nRpC12Uk9gS9baDl411NQApFmC26EwAOH8WgZl5MYYxFfc+NcPb1dKGj7Sk" crossorigin="anonymous">
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"
        integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js"
        integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo"
        crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js"
        integrity="sha384-OgVRvuATP1z7JjHLkuOU7Xw704+h835Lr+6QL9UvYjZE3Ipu6Tp75j7Bh/kR0JKI"
        crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital@1&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Open Sans', sans-serif;
        }

        #subtotal {
            margin-left: auto;
            margin-left: 0;

        }
    </style>
</head>

<body onload="timer()">
    <div class="container shadow-lg p-3">
        <div class="row">
            <div class="col-md-12">
                <div class="p-3 my-3 bg-dark text-white shadow-lg p-3 mb-5">
                    <h1>ABC Hardware</h1>
                    <p>Customer Invoice Form</p>
                    <p id="time"></p>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6 shadow-lg p-3">
                <div class="text-center form-group">
                    <h1 class="display-5 text-secondary">Customer Details</h1>
                </div>
                <form>
                    <div class="row form-group">
                        <div class="col">
                            <input type="date" class="form-control" id="date">
                        </div>
                        <div class="col">
                            <input type="text" class="form-control" placeholder="Customer ID" id="cid">
                        </div>
                        <div class="col">
                            <input type="text" class="form-control" placeholder="Invoice Number" id="invId">
                        </div>
                    </div>
                </form>

                <form>
                    <div class="form-group">
                        <label for="bcn">Billing Customer Name</label>
                        <input type="text" class="form-control" id="bcn" placeholder="Customer Name">
                    </div>
                    <div class="form-group">
                        <label for="customerAdd">Customer Address</label>
                        <div class="form-row" id="customerAdd">
                            <div class="form-group col-md-6">
                                <input type="text" class="form-control" id="bad1" placeholder="Customer Address1">
                            </div>
                            <div class="form-group col-md-6">
                                <input type="text" class="form-control" id="bad2" placeholder="Customer Address2">
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="scn">Shipping Customer Name</label>
                        <input type="text" class="form-control" id="scn" placeholder="Customer Name">
                    </div>
                    <div class="form-group">
                        <label for="sad">Customer Address</label>
                        <div class="form-row" id="sad">
                            <div class="form-group col-md-6">
                                <input type="text" class="form-control" id="sad1" placeholder="Customer Address1">
                            </div>
                            <div class="form-group col-md-6">
                                <input type="text" class="form-control" id="sad2" placeholder="Customer Address2">
                            </div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="phNo">Phone Number</label>
                        <input type="number" class="form-control" id="phNo" placeholder="Customer Name">
                    </div>
                    <input class="btn btn-success" type="button" value="Save Customer Info" id="customerInfo">
                    <input class="btn btn-danger" type="reset" value="Reset">
                </form>
            </div>

            <div class="col-md-6 shadow-lg p-3">
                <form>
                    <h1 class="display-5 text-dark text-center">Billing Items</h1>
                    <button type="button" class="btn btn-success mb-1">Add Item</button>
                    <div class="row">
                        <div class="form-group">
                            <label for="bcn">Billing Customer Name</label>
                            <input type="text" class="form-control" id="bcn" placeholder="Customer Name">
                        </div>
                        <div class="form-group">
                            <label for="bcn">Billing Customer Name</label>
                            <input type="text" class="form-control" id="bcn" placeholder="Customer Name">
                        </div>
                        <div class="form-group">
                            <label for="bcn">Billing Customer Name</label>
                            <input type="text" class="form-control" id="bcn" placeholder="Customer Name">
                        </div>
                    </div>

                </form>

            </div>
        </div>


    </div>

</body>

</html>

<script>
    function timer() {
        var d = new Date();
        document.getElementById("time").innerHTML = "System Date & time: " + d;
        setTimeout(timer, 500)
    }

</script>
