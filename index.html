<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
    <script src="https://code.jquery.com/jquery-3.4.1.slim.min.js" integrity="sha384-J6qa4849blE2+poT4WnyKhv5vZF5SrPo0iEjwBvKU7imGFAV0wwj1yYfoRSJoZ+n" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js" integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo" crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.min.js" integrity="sha384-wfSDF2E50Y2D1uUdj0O3uMBJnjuUD4Ih7YwaYd1iqfktj0Uod8GCExl3Og8ifwB6" crossorigin="anonymous"></script>

    <title>Log in Home Page</title>
</head>
<link href="https://fonts.googleapis.com/css2?family=Comic+Neue&display=swap" rel="stylesheet">
<style>
*{
    font-family: 'Comic Neue', cursive;
}
</style>
<body>
    <p id="time"></p>

    <div class="container-fluid">
        <center>
            <p> <b>
                <h3>Log In Page</h3>
                Enter Your Email Address: <input type="text" placeholder="Your Email ID" id="usr">
            </p>
            <p>
                Enter Your Password: <input type="password" placeholder="Your password" id="pwd"> <br>
            </p>
            <button onclick="uservalidate()" class="btn btn-success">Log In</button>
            <p id="message"></p>
   
        </center>

    </div>
</body onload="timer()">
</html>

<script>
    function uservalidate(){
        var usr=document.getElementById("usr").value;
        var pwd=document.getElementById("pwd").value;

        if(usr=="raj@gmail.com" && pwd=="12345"){
            window.location.href="covid.html";
        } else{
            document.getElementById("message").innerHTML="Log In Failure";
        }
    }

    function timer(){
        var d=new Date();

        var h=d.getHours();
        var m=d.getMinutes()
        var s=d.getSeconds();

        document.getElementById("time").innerHTML=h +":"+m+":"+s;
        setTimeout(timer,500);
    }
</script>
